name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main
    
jobs:
  deploy:
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1
        with:
          host: 210.79.129.72
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # Load environment profiles and NVM if installed
            . ~/.profile
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /home/ubuntu/chainode-server
            git pull
            npm install
            pm2 restart 0

             

